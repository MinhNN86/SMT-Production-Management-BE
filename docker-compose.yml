version: '3.8'
services:
  postgres_db:
    image: postgres:16-alpine
    container_name: production_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: smatec#2025#2026
      POSTGRES_DB: production_management_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: